<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Hub Portal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (for compiling JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes yay-fade {
            0% { transform: scale(0.5) translateZ(0); opacity: 0; }
            20% { transform: scale(1.2) translateZ(0); opacity: 1; }
            30% { transform: scale(1) translateZ(0); opacity: 1; }
            80% { transform: scale(1.1) translateZ(0); opacity: 1; }
            100% { transform: scale(3) translateZ(0); opacity: 0; }
        }
        @keyframes confetti-explode {
            0% { transform: translate3d(0, 0, 0) rotate(0deg) scale(0); opacity: 1; }
            15% { opacity: 1; transform: translate3d(calc(var(--tx) * 0.15), calc(var(--ty) * 0.15), 0) rotate(calc(var(--rot) * 0.15)) scale(1); }
            80% { opacity: 1; transform: translate3d(calc(var(--tx) * 0.8), calc(var(--ty) * 0.8), 0) rotate(calc(var(--rot) * 0.8)) scale(1); }
            100% { transform: translate3d(var(--tx), calc(var(--ty) + 20vh), 0) rotate(var(--rot)) scale(0); opacity: 0; }
        }
        @keyframes magical-float {
            0%, 100% { transform: translateY(0px) translateZ(0); }
            50% { transform: translateY(-12px) translateZ(0); }
        }
        @keyframes icon-pulse {
            0%, 100% { transform: scale(1) translateZ(0); }
            50% { transform: scale(1.15) translateZ(0); }
        }
        @keyframes glow-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Inline SVG Icons (replacing the lucide-react package for standalone HTML)
        const Lock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>);
        const Unlock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>);
        const Utensils = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path><path d="M7 2v20"></path><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"></path></svg>);
        const Home = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>);
        const Building = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>);
        const ChevronRight = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"></path></svg>);
        const Sparkles = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>);

        function App() {
            const [inputValue, setInputValue] = useState('');
            const [isUnlocked, setIsUnlocked] = useState(false);
            const [isUnlocking, setIsUnlocking] = useState(false);
            const [showError, setShowError] = useState(false);

            // The magic phrase to unlock the hub
            const secretPhrase = "hello charchee";

            useEffect(() => {
                // Check if the input matches the secret phrase (ignoring case and extra spaces)
                if (inputValue.trim().toLowerCase() === secretPhrase) {
                    setIsUnlocking(true);
                    setShowError(false);
                    // Wait for the portal expansion animation to complete before revealing portals
                    setTimeout(() => {
                        setIsUnlocked(true);
                        setIsUnlocking(false);
                    }, 1500);
                } else if (inputValue.length > secretPhrase.length + 5) {
                    // Show a subtle hint if they type too much
                    setShowError(true);
                } else {
                    setShowError(false);
                }
            }, [inputValue]);

            const portals = [
                {
                    title: "Food & Beverage",
                    description: "Explore our dynamic culinary and restaurant management demo.",
                    icon: <Utensils className="w-8 h-8 text-blue-400" />,
                    url: "https://hellocharchee.github.io/foodandbeverageportal/",
                    color: "from-blue-600 to-cyan-600"
                },
                {
                    title: "Short Term Rental",
                    description: "Discover our immersive property and booking management showcase.",
                    icon: <Home className="w-8 h-8 text-indigo-400" />,
                    url: "https://hellocharchee.github.io/shorttermrentalportal/",
                    color: "from-indigo-600 to-purple-600"
                },
                {
                    title: "Hotel Demo",
                    description: "Step into our premium hotel hospitality and reservation system.",
                    icon: <Building className="w-8 h-8 text-sky-400" />,
                    url: "https://hellocharchee.github.io/hotelportal/",
                    color: "from-sky-600 to-blue-800"
                }
            ];

            // Generate confetti pieces once
            const confettiPieces = useMemo(() => {
                const colors = ['#3b82f6', '#22d3ee', '#a855f7', '#10b981', '#f43f5e', '#facc15'];
                return Array.from({ length: 80 }).map(() => {
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 30 + Math.random() * 40; // Explosion radius
                    return {
                        tx: Math.cos(angle) * velocity + 'vw',
                        ty: Math.sin(angle) * velocity + 'vh',
                        color: colors[Math.floor(Math.random() * colors.length)],
                        delay: Math.random() * 0.2 + 's',
                        rotation: Math.random() * 720 + 'deg',
                        size: Math.random() * 10 + 6 + 'px',
                        shape: Math.random() > 0.5 ? '50%' : '0%' // Mix of circles and squares
                    };
                });
            }, []);

            return (
                <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 font-sans relative overflow-hidden">
                    {/* Metallic Dark Blue Background Effects */}
                    <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-900/20 rounded-full blur-[120px] pointer-events-none" />
                    <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-indigo-900/20 rounded-full blur-[150px] pointer-events-none" />

                    {/* Main Content Area */}
                    <div className="z-10 w-full max-w-5xl transition-all duration-700 ease-in-out">
                        {!isUnlocked ? (
                            <div className="flex justify-center items-center w-full min-h-[400px] relative">
                                
                                {/* "Yay!" Animation Overlay */}
                                {isUnlocking && (
                                    <div className="absolute inset-0 flex items-center justify-center z-50 pointer-events-none">
                                        {/* Confetti Explosion */}
                                        {confettiPieces.map((piece, i) => (
                                            <div
                                                key={i}
                                                className="absolute"
                                                style={{
                                                    '--tx': piece.tx,
                                                    '--ty': piece.ty,
                                                    '--rot': piece.rotation,
                                                    backgroundColor: piece.color,
                                                    width: piece.size,
                                                    height: piece.size,
                                                    borderRadius: piece.shape,
                                                    willChange: 'transform, opacity',
                                                    animation: `confetti-explode 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards ${piece.delay}`,
                                                }}
                                            />
                                        ))}

                                        <h2 
                                            className="text-7xl md:text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-blue-500 drop-shadow-[0_0_30px_rgba(34,211,238,0.8)]"
                                            style={{ animation: 'yay-fade 1.5s ease-in-out forwards', willChange: 'transform, opacity' }}
                                        >
                                            Yay!
                                        </h2>
                                    </div>
                                )}

                                <div 
                                    className={`relative flex flex-col items-center justify-center w-80 h-80 sm:w-96 sm:h-96 text-center overflow-hidden z-20 rounded-full ${isUnlocking ? 'bg-transparent border-[8px] border-cyan-400 shadow-[0_0_100px_rgba(34,211,238,1),inset_0_0_100px_rgba(34,211,238,1)]' : 'bg-gradient-to-br from-slate-600 via-slate-900 to-slate-950 border-[8px] border-slate-600 border-t-slate-400 border-b-slate-800 border-l-slate-500 border-r-slate-700 shadow-[inset_0_10px_40px_rgba(0,0,0,0.9),0_0_50px_rgba(30,58,138,0.5)]'}`}
                                    style={{
                                        transition: 'transform 1.5s ease-in, opacity 1s ease-in 0.5s, box-shadow 0.5s ease-out, border-color 0.5s ease-out',
                                        transform: isUnlocking ? 'scale(15)' : 'scale(1)',
                                        opacity: isUnlocking ? 0 : 1
                                    }}
                                >
                                    {/* Inner container fades out quickly while the ring expands into a portal */}
                                    <div 
                                        className="absolute inset-0 flex flex-col items-center justify-center w-full h-full transition-opacity duration-300"
                                        style={{ opacity: isUnlocking ? 0 : 1 }}
                                    >
                                        {/* Inner vault ring */}
                                        <div className="absolute inset-3 border-2 border-slate-800 border-t-slate-900 border-b-slate-600 rounded-full pointer-events-none opacity-60"></div>
                                        
                                        <div className="flex justify-center mb-6 z-10">
                                            <div className={`p-5 rounded-full border-2 shadow-[inset_0_2px_10px_rgba(0,0,0,0.5),0_5px_15px_rgba(0,0,0,0.6)] transition-colors duration-500 ${isUnlocking ? 'bg-blue-900/80 border-blue-400 text-blue-300' : 'bg-gradient-to-b from-slate-600 to-slate-800 border-slate-400 border-b-slate-700 text-slate-200'}`}>
                                                {isUnlocking ? <Unlock className="w-10 h-10" /> : <Lock className="w-10 h-10" />}
                                            </div>
                                        </div>
                                        
                                        <p className="text-slate-300 mb-8 text-lg sm:text-xl z-10 drop-shadow-md">
                                            Please say <br/>
                                            <span className="text-blue-400 font-bold tracking-tight">"hello charchee"</span>
                                        </p>

                                        <div className="relative w-3/4 z-10">
                                            <input
                                                type="text"
                                                value={inputValue}
                                                onChange={(e) => setInputValue(e.target.value)}
                                                placeholder="Type here..."
                                                disabled={isUnlocking}
                                                className="w-full bg-slate-950/80 border-2 border-slate-800 border-t-slate-950 text-slate-200 px-6 py-3 rounded-full focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 transition-all text-center text-lg placeholder:text-slate-600 shadow-[inset_0_4px_12px_rgba(0,0,0,0.8)] disabled:opacity-50"
                                                autoComplete="off"
                                            />
                                            
                                            {showError && (
                                                <p className="absolute -bottom-8 left-0 right-0 text-rose-400 text-sm animate-pulse font-medium drop-shadow-md">
                                                    Hint: Just say "hello charchee"
                                                </p>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="transform transition-all duration-1000 animate-in fade-in zoom-in-95 duration-700">
                                <div className="text-center mb-12">
                                    <div className="inline-flex items-center justify-center p-3 bg-blue-900/30 rounded-full border border-blue-500/30 mb-6 text-blue-400 shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                                        <Unlock className="w-6 h-6 mr-2" />
                                        <span className="font-medium tracking-wider uppercase text-sm">Access Granted</span>
                                    </div>
                                    <h1 className="text-4xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-200 via-blue-400 to-indigo-300 mb-4 tracking-tight drop-shadow-sm">
                                        Welcome To the Hello Charchee Hub
                                    </h1>
                                    <p className="text-lg text-slate-400 max-w-2xl mx-auto flex items-center justify-center gap-2">
                                        <Sparkles className="w-5 h-5 text-indigo-400" />
                                        Select a gateway to enter one of the demonstration portals.
                                    </p>
                                </div>

                                {/* Portal Grid */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                                    {portals.map((portal, index) => (
                                        <a
                                            key={index}
                                            href={portal.url}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="group relative block p-8 bg-slate-900/40 backdrop-blur-xl border border-blue-500/20 rounded-3xl overflow-hidden flex flex-col h-full transition-all duration-500 hover:border-blue-400/50 shadow-[0_10px_30px_rgba(30,58,138,0.2)]"
                                            style={{ 
                                                animation: `magical-float ${4 + index * 0.5}s ease-in-out infinite`,
                                                animationDelay: `${index * 0.2}s`,
                                                willChange: 'transform'
                                            }}
                                        >
                                            {/* Magical background ambient glow - now using hardware accelerated opacity */}
                                            <div className="absolute inset-0 bg-gradient-to-b from-transparent to-blue-900/20 pointer-events-none" style={{ animation: `glow-pulse ${3 + index * 0.5}s ease-in-out infinite` }} />
                                            
                                            {/* Hover gradient background effect */}
                                            <div className={`absolute inset-0 opacity-0 group-hover:opacity-20 transition-opacity duration-700 bg-gradient-to-br ${portal.color}`} />
                                            
                                            <div className="mb-6 p-4 bg-slate-950/60 inline-block rounded-2xl border border-slate-700/50 shadow-[inset_0_0_20px_rgba(0,0,0,0.5)] group-hover:shadow-[inset_0_0_20px_rgba(59,130,246,0.3)] transition-all duration-500 relative z-10"
                                                 style={{ animation: `icon-pulse ${3 + index}s ease-in-out infinite`, willChange: 'transform' }}>
                                                {portal.icon}
                                            </div>
                                            
                                            <h3 className="text-2xl font-bold text-slate-200 mb-3 group-hover:text-blue-300 transition-colors relative z-10">
                                                {portal.title}
                                            </h3>
                                            
                                            <p className="text-slate-400 mb-8 flex-grow leading-relaxed relative z-10">
                                                {portal.description}
                                            </p>
                                            
                                            <div className="flex items-center text-blue-400 font-medium group-hover:text-cyan-300 mt-auto relative z-10 transition-colors">
                                                <span>Enter Portal</span>
                                                <ChevronRight className="w-5 h-5 ml-1 transform group-hover:translate-x-2 transition-transform duration-300" />
                                            </div>
                                        </a>
                                    ))}
                                </div>

                                {/* Lock Button */}
                                <div className="mt-16 text-center">
                                    <button 
                                        onClick={() => {
                                            setInputValue('');
                                            setIsUnlocked(false);
                                        }}
                                        className="text-slate-500 hover:text-slate-300 text-sm font-medium transition-colors flex items-center justify-center mx-auto gap-2"
                                    >
                                        <Lock className="w-4 h-4" />
                                        Lock Hub
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
